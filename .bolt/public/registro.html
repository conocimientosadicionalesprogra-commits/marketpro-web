<a href="/registro.html" class="boton-estilizado">Ir a Crear Usuario</a>

<button id="btnAbrirFormulario">Nuevo Usuario</button>

<div id="miModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div style="background:white; margin:15% auto; padding:20px; width:300px; border-radius:10px;">
        <h3>Registrar Usuario</h3>
        <form id="formUsuario">
            <input type="text" id="nombre" placeholder="Nombre" required><br><br>
            <input type="email" id="email" placeholder="Email" required><br><br>
            <input type="password" id="password" placeholder="Contraseña" required><br><br>
            <button type="submit">Guardar en Base de Datos</button>
            <button type="button" id="btnCerrar">Cancelar</button>
        </form>
    </div>
</div>

<script>const modal = document.getElementById('miModal');
const btnAbrir = document.getElementById('btnAbrirFormulario');
const btnCerrar = document.getElementById('btnCerrar');

// Al dar clic, mostramos la "pantalla"
btnAbrir.onclick = () => modal.style.display = "block";

// Al dar clic en cancelar, la ocultamos
btnCerrar.onclick = () => modal.style.display = "none";</script>
